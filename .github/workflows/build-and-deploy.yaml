name: Build and Deploy Docker

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly security rebuild, every Monday at 02:00 UTC.
    # This always rebuilds with --no-cache and pushes, so upstream Alpine and
    # OpenSSH fixes are picked up even when the detected versions are unchanged.
    - cron: '0 2 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded pull-request builds, but never interrupt a
  # master / schedule / dispatch run that may be pushing images.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Shell syntax check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Bash syntax check
        run: |
          find . -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

  build:
    name: Build and publish image
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Detect Alpine and OpenSSH versions
        id: versions
        run: |
          set -euo pipefail

          # Alpine version from the official image (e.g. 3.24.1 -> tag suffix 3.24).
          alpine_full="$(docker run --rm alpine:latest sh -c '. /etc/os-release && printf %s "$VERSION_ID"')"
          alpine="$(printf '%s' "$alpine_full" | cut -d. -f1,2)"

          # Exact openssh package version available in that Alpine branch.
          policy="$(docker run --rm alpine:latest sh -c 'apk update -q >/dev/null 2>&1 && apk policy openssh')"
          openssh=""
          if [[ "$policy" =~ ([0-9]+\.[0-9]+_p[0-9]+-r[0-9]+) ]]; then
            openssh="${BASH_REMATCH[1]}"
          fi

          if [ -z "$alpine" ] || [ -z "$openssh" ]; then
            echo "::error::version detection failed (alpine='$alpine', openssh='$openssh')"
            echo "apk policy output was:"
            printf '%s\n' "$policy"
            exit 1
          fi

          {
            echo "alpine=$alpine"
            echo "openssh=$openssh"
          } >> "$GITHUB_OUTPUT"
          echo "Building OpenSSH '$openssh' on Alpine '$alpine' (base image alpine:$alpine_full)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # metadata-action lowercases image names, so the mixed-case
          # repository owner is handled automatically for GHCR.
          images: |
            hermsi/alpine-sshd
            quay.io/hermsi1337/alpine-sshd
            ghcr.io/${{ github.repository_owner }}/docker-sshd
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.versions.outputs.openssh }}
            type=raw,value=${{ steps.versions.outputs.openssh }}-alpine
            type=raw,value=${{ steps.versions.outputs.openssh }}-alpine${{ steps.versions.outputs.alpine }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: true
          pull: true
          provenance: false
          build-args: |
            ALPINE_VERSION=${{ steps.versions.outputs.alpine }}
            OPENSSH_VERSION=${{ steps.versions.outputs.openssh }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
